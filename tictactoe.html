<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Game Zone · Tic Tac Toe AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }

    .game-container {
      max-width: 600px;
      width: 100%;
      background: rgba(22, 20, 40, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 2.5rem;
      padding: 2rem 1.8rem;
      box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(108, 92, 231, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .game-header {
      text-align: center;
      margin-bottom: 1.2rem;
    }

    .game-zone-badge {
      display: inline-block;
      background: #6C5CE7;
      padding: 0.3rem 1.2rem;
      border-radius: 40px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 1px;
      color: white;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      box-shadow: 0 4px 10px rgba(108, 92, 231, 0.3);
    }

    h1 {
      color: #ffffff;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
    }

    /* Settings Bar */
    .settings-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      background: rgba(10, 8, 22, 0.6);
      border-radius: 60px;
      padding: 0.8rem 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(108, 92, 231, 0.25);
    }

    .mode-group {
      display: flex;
      align-items: center;
      gap: 1rem;
      color: white;
      font-weight: 500;
    }

    .mode-group label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
    }

    .mode-group input[type="radio"] {
      accent-color: #6C5CE7;
      width: 18px;
      height: 18px;
    }

    .difficulty-select {
      background: #1e1a36;
      color: white;
      border: 1px solid #6C5CE7;
      border-radius: 30px;
      padding: 0.4rem 1rem;
      font-weight: 500;
      font-size: 0.95rem;
      cursor: pointer;
      outline: none;
    }

    .difficulty-select:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Score Panel */
    .score-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(10, 8, 22, 0.6);
      border-radius: 60px;
      padding: 0.6rem 1.2rem;
      margin-bottom: 2rem;
      border: 1px solid rgba(108, 92, 231, 0.25);
    }

    .score-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: white;
      font-weight: 600;
      font-size: 1.2rem;
    }

    .player-badge {
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      font-weight: 800;
      font-size: 1.4rem;
    }

    .player-x .player-badge {
      background: #6C5CE7;
      color: white;
      box-shadow: 0 4px 0 #4a3bb5;
    }

    .player-o .player-badge {
      background: #00CEC9;
      color: #0f0c29;
      box-shadow: 0 4px 0 #00a8a3;
    }

    .score-value {
      background: #1e1a36;
      padding: 0.3rem 1rem;
      border-radius: 40px;
      min-width: 55px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: #f0f0f0;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
    }

    /* Game Board */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 2rem;
    }

    .cell {
      aspect-ratio: 1 / 1;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(108, 92, 231, 0.3);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4.5rem;
      font-weight: 700;
      color: white;
      text-shadow: 0 4px 10px rgba(0,0,0,0.4);
      cursor: pointer;
      transition: all 0.15s ease;
      box-shadow: 0 8px 0 rgba(0, 0, 0, 0.2);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .cell:not(.disabled):hover {
      background: rgba(108, 92, 231, 0.2);
      border-color: #6C5CE7;
      transform: scale(1.02);
    }

    .cell.disabled {
      cursor: not-allowed;
      opacity: 0.8;
      box-shadow: 0 4px 0 rgba(0, 0, 0, 0.2);
      transform: translateY(4px);
    }

    .cell.win-highlight {
      background: #00CEC9;
      border-color: #00fff7;
      color: #0f0c29;
      text-shadow: none;
      box-shadow: 0 0 20px #00CEC9;
    }

    .cell[data-value="X"] { color: #a29bfe; }
    .cell[data-value="O"] { color: #00CEC9; }

    /* Status */
    .status-area {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .turn-indicator {
      font-size: 1.3rem;
      font-weight: 600;
      color: #ddd9ff;
      background: rgba(108, 92, 231, 0.15);
      padding: 0.7rem 1rem;
      border-radius: 60px;
      display: inline-block;
      min-width: 250px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* Buttons */
    .action-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .btn {
      flex: 1;
      background: #6C5CE7;
      border: none;
      border-radius: 60px;
      padding: 0.9rem 1rem;
      font-size: 1.1rem;
      font-weight: 700;
      color: white;
      cursor: pointer;
      box-shadow: 0 8px 0 #4a3bb5, 0 4px 12px rgba(0,0,0,0.3);
      transition: all 0.08s ease;
      border: 1px solid rgba(255,255,255,0.1);
      letter-spacing: 0.5px;
    }

    .btn-secondary {
      background: #2d2a4a;
      box-shadow: 0 8px 0 #1e1a36;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 0 #4a3bb5, 0 6px 14px rgba(0,0,0,0.4);
    }

    .btn-secondary:hover {
      box-shadow: 0 10px 0 #1e1a36, 0 6px 14px rgba(0,0,0,0.4);
    }

    .btn:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #4a3bb5, 0 6px 12px rgba(0,0,0,0.3);
    }

    .btn-secondary:active {
      box-shadow: 0 4px 0 #1e1a36, 0 6px 12px rgba(0,0,0,0.3);
    }

    @media (max-width: 480px) {
      .game-container { padding: 1.5rem 1rem; }
      h1 { font-size: 1.8rem; }
      .cell { font-size: 3.2rem; border-radius: 18px; }
      .settings-bar { flex-direction: column; gap: 0.5rem; }
      .action-buttons { flex-direction: column; }
      .btn { padding: 0.8rem; }
    }
  </style>
</head>
<body>

<div class="game-container">
  <div class="game-header">
    <span class="game-zone-badge">Game Zone</span>
    <h1>Tic Tac Toe · AI</h1>
  </div>

  <!-- Mode & Difficulty Controls -->
  <div class="settings-bar">
    <div class="mode-group">
      <label><input type="radio" name="gameMode" value="twoPlayer" checked> 2 Players</label>
      <label><input type="radio" name="gameMode" value="vsAI"> vs AI</label>
    </div>
    <select id="difficultySelect" class="difficulty-select" disabled>
      <option value="normal">Normal</option>
      <option value="hard" selected>Hard</option>
      <option value="insane">Insane</option>
    </select>
  </div>

  <!-- Score Display -->
  <div class="score-panel">
    <div class="score-item player-x">
      <span class="player-badge">X</span>
      <span class="score-value" id="scoreX">0</span>
    </div>
    <div class="score-item player-o">
      <span class="player-badge">O</span>
      <span class="score-value" id="scoreO">0</span>
    </div>
  </div>

  <!-- Game Grid -->
  <div class="board" id="board"></div>

  <!-- Status -->
  <div class="status-area">
    <div class="turn-indicator" id="statusMessage">Player X's Turn</div>
  </div>

  <!-- Action Buttons -->
  <div class="action-buttons">
    <button class="btn" id="newGameBtn">🔄 New Game</button>
    <button class="btn btn-secondary" id="resetScoresBtn">🏆 Reset Scores</button>
  </div>
</div>

<script>
  (function() {
    "use strict";

    // ---------- Game State ----------
    let board = [['', '', ''], ['', '', ''], ['', '', '']];
    let currentPlayer = 'X';            // 'X' always starts
    let gameActive = true;
    let winner = null;                 // 'X', 'O', 'draw', or null
    let isAITurn = false;              // Flag to prevent multiple AI moves
    let aiTimeout = null;

    // Scores
    let scoreX = 0;
    let scoreO = 0;

    // Game Mode & Difficulty
    let gameMode = 'twoPlayer';         // 'twoPlayer' or 'vsAI'
    let difficulty = 'hard';            // 'normal', 'hard', 'insane'

    // DOM Elements
    const boardEl = document.getElementById('board');
    const statusMessageEl = document.getElementById('statusMessage');
    const scoreXEl = document.getElementById('scoreX');
    const scoreOEl = document.getElementById('scoreO');
    const newGameBtn = document.getElementById('newGameBtn');
    const resetScoresBtn = document.getElementById('resetScoresBtn');
    const modeRadios = document.querySelectorAll('input[name="gameMode"]');
    const difficultySelect = document.getElementById('difficultySelect');

    let cellElements = [];

    // ---------- Helper Functions ----------
    function updateScoreUI() {
      scoreXEl.textContent = scoreX;
      scoreOEl.textContent = scoreO;
    }

    function updateStatusMessage(message) {
      if (message) {
        statusMessageEl.textContent = message;
        return;
      }

      if (!gameActive) {
        if (winner === 'X') statusMessageEl.textContent = `🎉 Player X Wins! 🎉`;
        else if (winner === 'O') statusMessageEl.textContent = `🎉 ${gameMode === 'vsAI' ? 'AI' : 'Player O'} Wins! 🎉`;
        else if (winner === 'draw') statusMessageEl.textContent = `🤝 It's a Draw! 🤝`;
        return;
      }

      if (gameMode === 'vsAI' && currentPlayer === 'O' && gameActive) {
        statusMessageEl.textContent = `🤖 AI is thinking...`;
      } else {
        const playerText = currentPlayer === 'X' ? 'Player X' : (gameMode === 'vsAI' ? 'AI' : 'Player O');
        statusMessageEl.textContent = `${playerText}'s Turn (${currentPlayer})`;
      }
    }

    // Disable/enable all cells
    function setCellsDisabled(disabled) {
      cellElements.forEach(cell => {
        if (disabled) cell.classList.add('disabled');
        else if (!cell.textContent) cell.classList.remove('disabled');
      });
    }

    // Check win/draw and update state
    function checkGameState() {
      const winPatterns = [
        [[0,0],[0,1],[0,2]], [[1,0],[1,1],[1,2]], [[2,0],[2,1],[2,2]],
        [[0,0],[1,0],[2,0]], [[0,1],[1,1],[2,1]], [[0,2],[1,2],[2,2]],
        [[0,0],[1,1],[2,2]], [[0,2],[1,1],[2,0]]
      ];

      for (let pattern of winPatterns) {
        const [a,b,c] = pattern;
        const valA = board[a[0]][a[1]];
        const valB = board[b[0]][b[1]];
        const valC = board[c[0]][c[1]];
        if (valA && valA === valB && valB === valC) {
          winner = valA;
          gameActive = false;
          if (winner === 'X') scoreX++;
          else if (winner === 'O') scoreO++;
          updateScoreUI();
          pattern.forEach(([r,c]) => {
            const idx = r * 3 + c;
            cellElements[idx].classList.add('win-highlight');
          });
          setCellsDisabled(true);
          updateStatusMessage();
          return;
        }
      }

      const isFull = board.every(row => row.every(cell => cell !== ''));
      if (isFull) {
        winner = 'draw';
        gameActive = false;
        setCellsDisabled(true);
        updateStatusMessage();
        return;
      }

      updateStatusMessage();
    }

    // Make a move on board
    function makeMove(row, col, player) {
      if (!gameActive) return false;
      if (board[row][col] !== '') return false;
      if (player !== currentPlayer) return false;

      board[row][col] = player;
      const idx = row * 3 + col;
      const cell = cellElements[idx];
      cell.textContent = player;
      cell.setAttribute('data-value', player);
      cell.classList.add('disabled');

      checkGameState();

      if (gameActive) {
        currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        updateStatusMessage();
        
        // If vs AI and now it's O's turn, trigger AI
        if (gameMode === 'vsAI' && currentPlayer === 'O' && gameActive) {
          scheduleAIMove();
        } else {
          setCellsDisabled(false);
        }
      } else {
        setCellsDisabled(true);
      }
      return true;
    }

    // Handle human cell click
    function handleCellClick(row, col, cell) {
      if (!gameActive) return;
      if (isAITurn) return; // AI is thinking
      if (board[row][col] !== '') return;
      if (gameMode === 'vsAI' && currentPlayer === 'O') return; // Not human's turn

      makeMove(row, col, currentPlayer);
    }

    // ---------- AI Logic ----------
    function getEmptyCells() {
      const empty = [];
      for (let r=0; r<3; r++) {
        for (let c=0; c<3; c++) {
          if (board[r][c] === '') empty.push([r, c]);
        }
      }
      return empty;
    }

    function getRandomMove() {
      const empty = getEmptyCells();
      if (empty.length === 0) return null;
      return empty[Math.floor(Math.random() * empty.length)];
    }

    // Hard AI: win if possible, block opponent win, else random
    function getHardMove() {
      const empty = getEmptyCells();
      
      // 1. Try to win
      for (let [r,c] of empty) {
        board[r][c] = 'O';
        if (checkWinFor('O')) {
          board[r][c] = '';
          return [r, c];
        }
        board[r][c] = '';
      }
      
      // 2. Block X win
      for (let [r,c] of empty) {
        board[r][c] = 'X';
        if (checkWinFor('X')) {
          board[r][c] = '';
          return [r, c];
        }
        board[r][c] = '';
      }
      
      // 3. Random
      return getRandomMove();
    }

    function checkWinFor(player) {
      const wins = [
        [[0,0],[0,1],[0,2]], [[1,0],[1,1],[1,2]], [[2,0],[2,1],[2,2]],
        [[0,0],[1,0],[2,0]], [[0,1],[1,1],[2,1]], [[0,2],[1,2],[2,2]],
        [[0,0],[1,1],[2,2]], [[0,2],[1,1],[2,0]]
      ];
      return wins.some(pattern => 
        pattern.every(([r,c]) => board[r][c] === player)
      );
    }

    // Minimax for Insane AI
    function minimax(board, depth, isMaximizing) {
      if (checkWinFor('O')) return 10 - depth;
      if (checkWinFor('X')) return depth - 10;
      if (getEmptyCells().length === 0) return 0;

      if (isMaximizing) {
        let best = -Infinity;
        for (let [r,c] of getEmptyCells()) {
          board[r][c] = 'O';
          best = Math.max(best, minimax(board, depth+1, false));
          board[r][c] = '';
        }
        return best;
      } else {
        let best = Infinity;
        for (let [r,c] of getEmptyCells()) {
          board[r][c] = 'X';
          best = Math.min(best, minimax(board, depth+1, true));
          board[r][c] = '';
        }
        return best;
      }
    }

    function getInsaneMove() {
      let bestScore = -Infinity;
      let bestMove = null;
      for (let [r,c] of getEmptyCells()) {
        board[r][c] = 'O';
        let score = minimax(board, 0, false);
        board[r][c] = '';
        if (score > bestScore) {
          bestScore = score;
          bestMove = [r, c];
        }
      }
      return bestMove;
    }

    function getAIMove() {
      const empty = getEmptyCells();
      if (empty.length === 0) return null;

      switch (difficulty) {
        case 'normal': return getRandomMove();
        case 'hard': return getHardMove();
        case 'insane': return getInsaneMove();
        default: return getRandomMove();
      }
    }

    function performAIMove() {
      if (!gameActive || currentPlayer !== 'O' || gameMode !== 'vsAI') {
        isAITurn = false;
        return;
      }

      const move = getAIMove();
      if (move) {
        const [row, col] = move;
        makeMove(row, col, 'O');
      }
      isAITurn = false;
      setCellsDisabled(false);
    }

    function scheduleAIMove() {
      if (aiTimeout) clearTimeout(aiTimeout);
      isAITurn = true;
      setCellsDisabled(true);
      updateStatusMessage('🤖 AI is thinking...');
      
      const delay = difficulty === 'insane' ? 150 : 450;
      aiTimeout = setTimeout(() => {
        performAIMove();
        aiTimeout = null;
      }, delay);
    }

    // ---------- Board Reset ----------
    function resetBoard() {
      if (aiTimeout) {
        clearTimeout(aiTimeout);
        aiTimeout = null;
      }
      
      board = [['', '', ''], ['', '', ''], ['', '', '']];
      currentPlayer = 'X';
      gameActive = true;
      winner = null;
      isAITurn = false;

      cellElements.forEach((cell, idx) => {
        const row = Math.floor(idx / 3);
        const col = idx % 3;
        cell.textContent = '';
        cell.removeAttribute('data-value');
        cell.classList.remove('disabled', 'win-highlight');
      });

      setCellsDisabled(false);
      updateStatusMessage();
      
      // If vs AI and somehow AI should start? No, X always starts.
      if (gameMode === 'vsAI' && currentPlayer === 'O') {
        // Should not happen, but just in case
        currentPlayer = 'X';
      }
    }

    function resetScores() {
      scoreX = 0;
      scoreO = 0;
      updateScoreUI();
    }

    // ---------- Mode/Difficulty Change ----------
    function handleModeChange() {
      const selected = document.querySelector('input[name="gameMode"]:checked').value;
      gameMode = selected;
      difficultySelect.disabled = (gameMode === 'twoPlayer');
      
      // Reset board when mode changes to avoid confusion
      resetBoard();
      updateStatusMessage();
    }

    function handleDifficultyChange() {
      difficulty = difficultySelect.value;
      // No need to reset, but could if you want
    }

    // ---------- Build UI ----------
    function buildBoard() {
      boardEl.innerHTML = '';
      cellElements = [];
      for (let r=0; r<3; r++) {
        for (let c=0; c<3; c++) {
          const cell = document.createElement('button');
          cell.classList.add('cell');
          cell.setAttribute('aria-label', `Row ${r+1}, Column ${c+1}, empty`);
          cell.dataset.row = r;
          cell.dataset.col = c;
          
          cell.addEventListener('click', (e) => {
            e.preventDefault();
            const row = parseInt(cell.dataset.row);
            const col = parseInt(cell.dataset.col);
            handleCellClick(row, col, cell);
            cell.setAttribute('aria-label', `Row ${row+1}, Column ${col+1}, ${board[row][col] || 'empty'}`);
          });
          
          boardEl.appendChild(cell);
          cellElements.push(cell);
        }
      }
    }

    function init() {
      buildBoard();
      resetBoard();
      scoreX = 0; scoreO = 0;
      updateScoreUI();
      
      modeRadios.forEach(radio => radio.addEventListener('change', handleModeChange));
      difficultySelect.addEventListener('change', handleDifficultyChange);
      newGameBtn.addEventListener('click', resetBoard);
      resetScoresBtn.addEventListener('click', resetScores);
      
      // Initial mode set
      handleModeChange();
    }

    init();
  })();
</script>
</body>
</html>
